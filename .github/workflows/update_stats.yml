name: Update Repository Lifetime Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch, accumulate and inject stats
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN }}
          REPO_OWNER: josevdr95new
          REPO_NAME: cdbespa-alternativo
        run: python stats_collector.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "📊 Update lifetime stats [skip ci]"
          git push
